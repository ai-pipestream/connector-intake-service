# Connector-Intake Service Configuration
quarkus.application.name=connector-intake
quarkus.application.version=1.0.0-SNAPSHOT

# ======================================================================================================================
# HTTP / gRPC Configuration
quarkus.http.limits.max-body-size=10G
# ======================================================================================================================
# Connector-intake service port (18108). Context path matches app root name.
quarkus.http.host=0.0.0.0
quarkus.http.port=18108
quarkus.http.root-path=/
# Use separate gRPC server (Netty-based) - REQUIRED for HTTP/2 flow control window tuning
# Unified server mode (use-separate-server=false) does NOT support HTTP/2 flow control window configuration
# Separate server mode provides full control and proven 250-370 MB/s throughput
# The GrpcServerFlowControlCustomizer from dynamic-grpc package will automatically apply flow control settings
# See dynamic-grpc/UNIFIED_SERVER_LIMITATIONS.md for details

# gRPC Flow Control - 100MB window for better throughput with large messages
quarkus.grpc.server.flow-control-window=104857600
quarkus.grpc.server.max-outbound-message-size=2147483647

# Set gRPC client flow control for all clients (wildcard)
quarkus.grpc.clients."*".max-inbound-message-size=2147483647
quarkus.grpc.clients."*".flow-control-window=104857600

# ======================================================================================================================
# Vert.x / Netty Performance Tuning for High Throughput gRPC
# ======================================================================================================================
# Increase event loop threads for better concurrency
quarkus.vertx.event-loops-pool-size=8

# Netty buffer sizes - critical for large message throughput
# Prefer native transport for better performance
quarkus.vertx.prefer-native-transport=true
quarkus.http.io-threads=8

# Dev configuration
%dev.quarkus.http.port=18108
%dev.quarkus.devui.hosts=0.0.0.0

# ======================================================================================================================
# Database Configuration
# ======================================================================================================================
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=pipeline
quarkus.datasource.password=password

# Hibernate configuration
%dev.quarkus.hibernate-orm.schema-management.strategy=none
%dev.quarkus.flyway.migrate-at-start=true
%dev.quarkus.flyway.clean-at-start=true
%dev.quarkus.flyway.validate-on-migrate=false

# Prod: Use migrations
%prod.quarkus.datasource.reactive.url=postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:connector_intake}
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:connector_intake}
%prod.quarkus.hibernate-orm.schema-management.strategy=validate
%prod.quarkus.flyway.migrate-at-start=true
%prod.quarkus.flyway.baseline-on-migrate=true

quarkus.hibernate-orm.sql-load-script=no-file

# ======================================================================================================================
# Dev Services Configuration
# ======================================================================================================================
# Note: The quarkus-pipeline-devservices extension extracts the compose file to ~/.pipeline/
# but does NOT configure Quarkus Compose Dev Services automatically. You must add the properties below.

# Dev Services - DevServices discovers Compose PostgreSQL and uses the specified db-name
%dev.quarkus.datasource.devservices.enabled=true
%dev.quarkus.datasource.devservices.db-name=connector_intake
%dev.quarkus.datasource.devservices.username=pipeline
%dev.quarkus.datasource.devservices.password=password

# Redis: use the shared compose Redis exposed on localhost in dev mode.
# This avoids Quarkus Redis DevServices trying to attach to the missing
# pipeline-shared-devservices_default Docker network.
%dev.quarkus.redis.hosts=redis://localhost:6379

# Redis client pool sizing.
# Intake's RedisStreamIntakeIngressProducer.enqueue does an XADD per doc
# accepted on the upload-pipedoc gRPC paths. Quarkus defaults
# (max-pool-size=6, max-pool-waiting=24) overflow under burst load and
# throw ConnectionPoolTooBusyException, which propagates up to the gRPC
# caller as a UNAVAILABLE — losing docs at the intake boundary. Match the
# kafka-sidecar's pool sizing so the burst buffer stays a buffer.
quarkus.redis.max-pool-size=64
quarkus.redis.max-pool-waiting=4096

# ======================================================================================================================
# Kafka Configuration
# ======================================================================================================================
# Match the working service pattern for compose/dev and in-cluster/prod bootstrap behavior.
%dev.kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
%prod.kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}

# ======================================================================================================================
# Service Registration Configuration
# ======================================================================================================================
pipestream.registration.enabled=true
pipestream.registration.service-name=connector-intake
pipestream.registration.description=Connector document ingestion, authentication, metadata enrichment, and rate limiting
pipestream.registration.type=SERVICE
pipestream.registration.capabilities=document-ingestion,metadata-enrichment,rate-limiting
pipestream.registration.tags=connector,intake,core-service
# Pipestream server defaults
pipestream.server.class=core
pipestream.server.capabilities=pipedoc

# HTTP Endpoint Registration
pipestream.registration.http.enabled=true
pipestream.registration.http.scheme=${SERVICE_REGISTRATION_HTTP_SCHEME:http}
pipestream.registration.http.tls-enabled=${SERVICE_REGISTRATION_TLS_ENABLED:false}
pipestream.registration.http.schema=${OPENAPI_SCHEMA_URL}
pipestream.registration.http.schema-version=1.0.0
pipestream.registration.http.schema-artifact-id=connector-intake-service-http

# Production profile - use HTTPS and TLS
%prod.pipestream.registration.http.scheme=https
%prod.pipestream.registration.http.tls-enabled=true

%test.pipestream.registration.enabled=false

# ======================================================================================================================
# Connector-Intake Configuration
# ======================================================================================================================
connector-intake.default-rate-limit-per-minute=1000
connector-intake.max-concurrent-streams=100
connector-intake.session-timeout-minutes=60
connector-intake.session-cleanup-interval-minutes=10
connector-intake.chunk-assembly-timeout-minutes=30
connector-intake.max-chunk-size-mb=10
connector-intake.max-document-size-mb=10240
connector-intake.max-filename-length=255

# Repository-service HTTP proxy (raw upload) - Quarkus REST client with Stork discovery
quarkus.rest-client.repository-upload.url=stork://repository
quarkus.rest-client.repository-upload.read-timeout=3600000
quarkus.rest-client.repository-upload.connect-timeout=30000
%dev.quarkus.rest-client.repository-upload.url=http://localhost:18102
# TLS for prod (uncomment or set via env vars when HTTPS is required):
# quarkus.rest-client.repository-upload.tls-configuration-name=repository-tls
# quarkus.tls.repository-tls.trust-all=${REPO_TLS_TRUST_ALL:false}
# Stock Quarkus gRPC client for the repository service.
# Both the quarkus.grpc.clients."repository".* wiring AND the
# quarkus.stork."repository".* discovery config are required — without
# name-resolver=stork, @GrpcClient("repository") injection silently
# falls back to localhost:9000 and UploadBlob/RepositoryClient calls
# fail with "UNAVAILABLE: io exception, Connection refused:
# localhost/[::1]:9000". Same shape as the connector-admin /
# account-manager / engine stanzas below; the legacy stork.repository.*
# prefix alone is not enough.
quarkus.grpc.clients."repository".host=repository
quarkus.grpc.clients."repository".name-resolver=stork
quarkus.stork."repository".service-discovery.type=consul
quarkus.stork."repository".service-discovery.consul-host=${CONSUL_HOST:localhost}
quarkus.stork."repository".service-discovery.consul-port=${CONSUL_PORT:8500}

# Stock Quarkus gRPC clients for intake validation (ConnectorValidationService).
# Required because that service uses @GrpcClient("connector-admin") /
# @GrpcClient("account-manager") with Stork — without these properties the
# clients fall back to localhost:9000 and connector-admin lookups fail.
quarkus.grpc.clients."connector-admin".host=connector-admin
quarkus.grpc.clients."connector-admin".name-resolver=stork
quarkus.stork."connector-admin".service-discovery.type=consul
quarkus.stork."connector-admin".service-discovery.consul-host=${CONSUL_HOST:localhost}
quarkus.stork."connector-admin".service-discovery.consul-port=${CONSUL_PORT:8500}

quarkus.grpc.clients."account-manager".host=account-manager
quarkus.grpc.clients."account-manager".name-resolver=stork
quarkus.stork."account-manager".service-discovery.type=consul
quarkus.stork."account-manager".service-discovery.consul-host=${CONSUL_HOST:localhost}
quarkus.stork."account-manager".service-discovery.consul-port=${CONSUL_PORT:8500}

# Engine client: Stork→Consul resolves the registered "engine" service
# (172.17.0.1:28100 in dev) instead of the @GrpcClient("engine") falling
# back to localhost:9000.
quarkus.grpc.clients.engine.host=engine
quarkus.grpc.clients.engine.name-resolver=stork
quarkus.stork."engine".service-discovery.type=consul
quarkus.stork."engine".service-discovery.consul-host=${CONSUL_HOST:localhost}
quarkus.stork."engine".service-discovery.consul-port=${CONSUL_PORT:8500}

# ======================================================================================================================
# Container Image Configuration
# ======================================================================================================================
# GitHub Container Registry
quarkus.container-image.registry=ghcr.io
quarkus.container-image.group=ai-pipestream
quarkus.container-image.name=connector-intake-service
quarkus.container-image.tag=latest
quarkus.container-image.additional-tags=${quarkus.application.version}

# ======================================================================================================================
# Cache Configuration
# Account active status cached for 5 minutes to avoid repeated gRPC lookups
quarkus.cache.caffeine."account-active".expire-after-write=5M
# ======================================================================================================================

# ======================================================================================================================
# Quarkus Index Dependencies
quarkus.index-dependency.pipestream-server.group-id=ai.pipestream
quarkus.index-dependency.pipestream-server.artifact-id=pipestream-server
# ======================================================================================================================

# Safety override: round-robin N-channel fan-out in dynamic-grpc
# was making intake stall on first-use channel creation (8 Stork
# resolutions serial on one event loop). Keep at 1 for now; the
# N-channel path is reserved for the next iteration with eager
# warmup + parallel channel init.
quarkus.dynamic-grpc.channel.channels-per-service=4

# uploadPipeDoc calls spread across that many event loops on engine.

# Intake fans every uploadPipeDoc into engine; give that channel extra capacity
# so concurrent inbound streams spread across many outbound connections.
quarkus.dynamic-grpc.channel.per-service.engine=8
quarkus.dynamic-grpc.channel.per-service.repository=2
